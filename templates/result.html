<!DOCTYPE html>
<html>
<head>
    <title>Results</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">

    <h2>Analysis Results</h2>

    {% for r in results %}
    <div class="card">
        <h3>{{ r.name }}</h3>
        <p>Score: {{ r.score }}%</p>
        <p>{{ r.feedback }}</p>
    </div>
    {% endfor %}

</div>

</body>
</html>
